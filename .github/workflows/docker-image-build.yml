name: Build and Push Docker Images

on:
  push:
    branches:
      ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build user_service image
        uses: docker/build-push-action@v6
        with:
          context: ./back_end/
          file: ./back_end/user_service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/user_service:latest

      - name: Build products_service image
        uses: docker/build-push-action@v6
        with:
          context: ./back_end/
          file: ./back_end/products_service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/products_service:latest

      - name: Build cart_service image
        uses: docker/build-push-action@v6
        with:
          context: ./back_end/
          file: ./back_end/cart_service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cart_service:latest
  deploy:
    runs-on: ubuntu-latest
    container: ghcr.io/mitch1625/user_service:latest
    env:
      SVC_ID: 7afa255c-eb97-4e54-87f5-b008a9d2f888
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - uses: actions/checkout@v3
      - run: railway up --service=${{ env.SVC_ID }}
